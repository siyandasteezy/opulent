<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Opulent Interior D-Zines</title>
  <meta name="robots" content="noindex, follow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0d1626;
      color: #f5f0e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 480px; }
    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: 8rem;
      font-weight: 300;
      color: #b8864e;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .rule { width: 48px; height: 1px; background: #b8864e; margin: 1.5rem auto; }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 300;
      margin-bottom: 1rem;
    }
    p { font-size: 0.9rem; color: rgba(245,240,232,0.6); margin-bottom: 2.5rem; line-height: 1.7; }
    a {
      display: inline-block;
      padding: 0.9rem 2.2rem;
      background: linear-gradient(135deg, #b8864e, #d4a96a);
      color: #fff;
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 3px;
      transition: opacity 0.3s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <div class="rule"></div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. Let us guide you back to something beautiful.</p>
    <a href="/">Return Home →</a>
  </div>
</body>
</html>
